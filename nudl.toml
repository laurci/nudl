[package]
name = "nudl"

[[bin]]
name = "playground"
path = "playground/main.nudl"

[[bin]]
name = "game"
path = "playground/game.nudl"
link = [
    "../vendor/raylib-5.5_macos/lib/libraylib.a",
    "-framework", "CoreVideo",
    "-framework", "IOKit",
    "-framework", "Cocoa",
    "-framework", "GLUT",
    "-framework", "OpenGL",
    "-framework", "CoreFoundation",
]

[[bin]]
name = "opengl"
path = "playground/opengl.nudl"
link = [
    "-L/opt/homebrew/lib",
    "-lglfw",
    "-framework", "OpenGL",
    "-framework", "Cocoa",
    "-framework", "IOKit",
    "-framework", "CoreVideo",
]

[[bin]]
name = "server"
path = "playground/server.nudl"
